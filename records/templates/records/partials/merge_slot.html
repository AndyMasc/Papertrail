<div id="{{ mode }}-slot"
     :class="{{ selectedState }} ? 'border-zinc-900 dark:border-zinc-100 bg-zinc-900/[0.02] dark:bg-white/[0.02]' : 'border-zinc-200/50 dark:border-zinc-800/40 bg-white dark:bg-zinc-900/20'"
     class="relative group rounded-2xl border border-dashed p-6 text-center transition-all duration-300 hover:border-zinc-400 dark:hover:border-zinc-600 shadow-xs flex flex-col items-center justify-between min-h-[160px]">

    <button type="button"
            class="flex flex-col items-center justify-center gap-3 mx-auto text-zinc-400 dark:text-zinc-500 group-hover:text-zinc-800 dark:group-hover:text-zinc-200 transition-colors cursor-pointer w-full h-full flex-1"
            hx-get="{% url 'records:manual_merge_modal' mode %}"
            hx-target="#modal-inner"
            @click="showModal = true; $nextTick(() => document.getElementById('modal-inner').innerHTML = '')">
        <div :class="{{ selectedState }} ? 'bg-zinc-900 text-white dark:bg-white dark:text-zinc-950 scale-105' : 'bg-zinc-50 dark:bg-zinc-950 border border-zinc-200/60 dark:border-zinc-800'"
             class="p-3 rounded-xl transition-all duration-300 shadow-2xs">
            {% if icon == "bank" %}
            <svg class="size-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 8.25h19.5M2.25 9h19.5m-16.5 5.25h6m-6 2.25h3m-3.75 3h15a2.25 2.25 0 002.25-2.25V6.75A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25v10.5A2.25 2.25 0 004.5 19.5z" />
            </svg>
            {% else %}
            <svg class="size-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m2.25 0H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z" />
            </svg>
            {% endif %}
        </div>
        <div class="space-y-0.5">
            <span class="block text-[10px] font-semibold uppercase tracking-wider text-zinc-400 dark:text-zinc-500">{{ label }}</span>
            <span x-text="{{ selectedState }} ? {{ selectedTitle }} : 'Click to bind record'"
                  :class="{{ selectedState }} ? 'text-zinc-950 dark:text-zinc-50 font-medium' : 'text-zinc-400 dark:text-zinc-500 font-normal'"
                  class="text-xs block truncate max-w-[200px]"></span>
        </div>
    </button>

    <button x-show="{{ selectedState }}" x-cloak @click="{{ selectedState }} = null; {{ selectedTitle }} = ''" type="button" class="absolute top-2 right-2 p-1 rounded-md text-zinc-400 hover:text-rose-500 hover:bg-rose-50 dark:hover:bg-rose-950/30 transition-all cursor-pointer">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="size-3"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" /></svg>
    </button>
</div>
