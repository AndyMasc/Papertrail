{% if records %}
    <div id="query-results-container" class="flex overflow-x-auto snap-x snap-mandatory pb-6 gap-6 scrollbar-none sm:grid sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 sm:gap-6 sm:pb-0 animate-in fade-in duration-200">
        {% for record in records %}
            {% include 'records/record_card.html' %}
        {% endfor %}
    </div>
{% else %}
    <div id="query-results-container" class="text-center py-20 border border-dashed border-zinc-200 dark:border-zinc-800/80 rounded-4xl bg-gradient-to-b from-zinc-50/40 to-transparent dark:from-zinc-900/10 dark:to-transparent flex flex-col items-center justify-center p-6 gap-y-2 animate-in fade-in duration-200">
        <div class="w-12 h-12 rounded-2xl bg-zinc-50 dark:bg-zinc-900 flex items-center justify-center text-zinc-400 dark:text-zinc-600 border border-zinc-200/60 dark:border-zinc-800/80 mb-2">
            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v6m3-3H9m12 0a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
            </svg>
        </div>
        <h3 class="text-sm font-semibold text-zinc-900 dark:text-white tracking-tight">No records found</h3>
        <p class="text-xs text-zinc-400 dark:text-zinc-500 max-w-xs mx-auto text-balance">
            No results match your active filters or your workspace is currently unpopulated.
        </p>
        <a href="{% url 'documents:upload_document' %}" class="inline-flex items-center gap-1 mt-2 text-xs font-semibold px-3 py-1.5 rounded-full bg-zinc-950 text-white dark:bg-white dark:text-zinc-950 border border-transparent hover:bg-zinc-800 dark:hover:bg-zinc-100 transition-colors shadow-xs">
            Upload a document
        </a>
    </div>
{% endif %}
