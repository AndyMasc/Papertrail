<form hx-put="{% url 'records:edit_folder' folder.id %}"
      hx-target="this"
      hx-swap="outerHTML"
      class="w-full">
    {% csrf_token %}
    <div class="flex items-center gap-2">
        {{ form.name }}
        <button type="submit"
                class="p-1.5 rounded-lg text-zinc-400 hover:text-green-600 dark:hover:text-green-400 hover:bg-zinc-100 dark:hover:bg-zinc-800 transition-colors cursor-pointer"
                title="Save">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 9V5.25A2.25 2.25 0 0 1 6 3h12a2.25 2.25 0 0 1 2.25 2.25v13.5A2.25 2.25 0 0 1 18 21H6a2.25 2.25 0 0 1-2.25-2.25V9M3 12h18" /></svg>
        </button>
        <button type="button"
                hx-get="{% url 'records:view_folders' %}"
                hx-target="#directory-results-container"
                hx-swap="innerHTML"
                class="p-1.5 rounded-lg text-zinc-400 hover:text-zinc-600 dark:hover:text-zinc-200 hover:bg-zinc-100 dark:hover:bg-zinc-800 transition-colors cursor-pointer"
                title="Cancel">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" /></svg>
        </button>
    </div>
    {% if form.name.errors %}
        <p class="text-[10px] font-medium text-red-500 mt-1">{{ form.name.errors.0 }}</p>
    {% endif %}
</form>
