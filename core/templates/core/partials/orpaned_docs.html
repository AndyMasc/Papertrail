<section class="relative overflow-hidden rounded-2xl border border-amber-500/30 dark:border-amber-500/20 bg-amber-500/[0.02] dark:bg-amber-500/[0.01] p-4 sm:p-5 transition-all">
    <div class="absolute top-0 right-0 -mt-4 -mr-4 w-24 h-24 bg-amber-500/5 rounded-full blur-xl pointer-events-none"></div>
    
    <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4">
        <div class="flex items-start gap-3.5">
            <div class="flex h-9 w-9 shrink-0 items-center justify-center rounded-xl bg-amber-500/10 text-amber-600 dark:text-amber-400 border border-amber-500/20 shadow-2xs">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126ZM12 15.75h.007v.008H12v-.008Z" />
                </svg>
            </div>
            
            <div class="space-y-1">
                <div class="flex items-center gap-2">
                    <h2 class="text-xs font-semibold tracking-wide text-zinc-900 dark:text-zinc-300 uppercase text-[10px]">
                        Orphaned Files Detected
                    </h2>
                    <span class="inline-flex items-center px-2 py-0.5 rounded-full text-[11px] font-medium bg-amber-500/10 text-amber-700 dark:text-amber-400 border border-amber-500/20">
                        {{ orphaned_document_count }} Unlinked File{{ orphaned_document_count|pluralize }}
                    </span>
                </div>
                <p class="text-xs text-zinc-500 dark:text-zinc-400 leading-relaxed max-w-2xl">
                    These files are currently unassociated with any records. Unlinked files are permanently deleted after 24h according to our fair use policies.
                </p>
            </div>
        </div>

        <div class="shrink-0 pt-1 sm:pt-0 pl-12 sm:pl-0">
            <a href="{% url 'documents:document_list_view' %}?status=orphaned" 
               class="inline-flex items-center justify-center gap-1.5 px-3 py-1.5 text-xs font-medium text-zinc-700 hover:text-zinc-950 dark:text-zinc-300 dark:hover:text-white bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 hover:border-zinc-300 dark:hover:border-zinc-700 rounded-xl transition-all shadow-3xs cursor-pointer active:scale-[0.98]">
                <span>Review Orphans</span>
                <svg class="w-3 h-3 text-zinc-400 dark:text-zinc-500 transition-transform group-hover:translate-x-0.5" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3" />
                </svg>
            </a>
        </div>
    </div>
</section>
