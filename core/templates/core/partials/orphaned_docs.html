<section class="relative overflow-hidden rounded-2xl border border-amber-500/20 dark:border-amber-500/10 bg-gradient-to-br from-amber-500/[0.03] to-transparent dark:from-amber-500/[0.01] p-4 sm:p-5 transition-all shadow-xs group">
    <div class="absolute top-0 right-0 -mt-4 -mr-4 w-32 h-32 bg-amber-500/10 dark:bg-amber-500/5 rounded-full blur-2xl pointer-events-none transition-opacity group-hover:opacity-75"></div>

    <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 relative z-10">
        <div class="flex items-start gap-4">

            <div class="space-y-1.5 flex-1 min-w-0">
                <div class="flex flex-wrap items-center gap-2">
                    <h2 class="text-xs font-bold tracking-wider text-zinc-800 dark:text-zinc-200 uppercase">
                        Orphaned Files Detected
                    </h2>
                    <span class="inline-flex items-center px-2 py-0.5 rounded-md text-sm font-bold bg-amber-500/10 text-amber-700 dark:text-amber-300 border border-amber-500/20 whitespace-nowrap">
                        {{ orphaned_document_count }}
                    </span>
                </div>
                <p class="text-xs text-zinc-500 dark:text-zinc-400 leading-relaxed max-w-2xl">
                    These files are currently unassociated with any records. Unlinked files are permanently deleted after 24h in accordance with our fair use policies.
                </p>
            </div>
        </div>

        <div class="shrink-0 sm:pt-0 self-end sm:self-center">
            <a href="{% url 'documents:document_list_view' %}?status=orphaned"
               class="inline-flex items-center justify-center gap-2 px-3.5 py-2 text-xs font-semibold text-zinc-700 dark:text-zinc-300 bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 hover:bg-zinc-50 dark:hover:bg-zinc-800 rounded-xl transition-all duration-200 shadow-xs hover:shadow-md cursor-pointer active:scale-[0.98] focus:outline-hidden focus:ring-2 focus:ring-amber-500/40 dynamic-button">
                <span>Review Orphans</span>
                <svg class="w-3.5 h-3.5 text-zinc-400 dark:text-zinc-500 transition-transform duration-200 group-hover:translate-x-0.5" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3" />
                </svg>
            </a>
        </div>
    </div>
</section>
