<div class="space-y-2">
    {% for record in records %}
        <label data-record-id="{{ record.pk }}" 
               class="relative block transition-all duration-150 rounded-2xl cursor-pointer focus-within:outline-hidden"
               :class="selectedRecord == '{{ record.pk }}' ? 'ring-2 ring-black dark:ring-white shadow-xs' : 'hover:opacity-95'">
            
            <input type="radio" 
                   name="associated_record" 
                   value="{{ record.pk }}" 
                   x-model="selectedRecord"
                   class="sr-only">
            
            {% include 'documents/partials/record_card_simple.html' %}
            
        </label>
    {% empty %}
        <div class="text-center py-12 px-4 text-xs font-medium text-zinc-400 dark:text-zinc-500">
            No matching records found for this query.
        </div>
    {% endfor %}
</div>
