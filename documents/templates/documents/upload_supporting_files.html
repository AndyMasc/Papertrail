{% extends 'documents/upload_base.html' %}

{% block extra_fields %}
    <input type="text" required id="docTitle" class="focus:outline-none focus:ring-0 text-sm w-full mt-4 p-3 resize-none rounded-3xl bg-zinc-100 dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800" placeholder="Title"></input>
    <textarea id="docNotes" class="mb-2 focus:outline-none focus:ring-0 text-sm w-full mt-4 p-3 resize-none rounded-3xl bg-zinc-100 dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800" placeholder="Add a note..."></textarea>
{% endblock extra_fields %}

{% block upload_footer %}
    <hr class="w-xs my-7 text-zinc-200 dark:text-zinc-800 mb-5">
    <a href="{% url 'records:view_all_records' %}" class="mt-4 text-sm text-zinc-500 hover:text-zinc-700 transition-colors">
        Done adding files
    </a>
{% endblock upload_footer %}
