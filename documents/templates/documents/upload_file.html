{% extends 'documents/upload_base.html' %}

{% block onboarding_modal %}
    <div x-data="{ modalOpen: $persist(true) }"
         @keydown.escape.window="modalOpen = false"
         :class="{ 'z-40': modalOpen }" class="relative w-auto h-auto">
        <template x-teleport="body">
            <div x-show="modalOpen" class="fixed top-0 left-0 z-99 flex items-center justify-center w-screen h-screen" x-cloak>
                <div x-show="modalOpen"
                     x-transition:enter="ease-out duration-300"
                     x-transition:enter-start="opacity-0"
                     x-transition:enter-end="opacity-100"
                     x-transition:leave="ease-in duration-300"
                     x-transition:leave-start="opacity-100"
                     x-transition:leave-end="opacity-0"
                     @click="modalOpen=false" class="absolute inset-0 w-full h-full backdrop-blur-sm bg-white/70 dark:bg-zinc-950/70"></div>
                <div x-show="modalOpen"
                     x-trap.inert.noscroll="modalOpen"
                     x-transition:enter="ease-out duration-300"
                     x-transition:enter-start="opacity-0 -translate-y-2 sm:scale-95"
                     x-transition:enter-end="opacity-100 translate-y-0 sm:scale-100"
                     x-transition:leave="ease-in duration-200"
                     x-transition:leave-start="opacity-100 translate-y-0 sm:scale-100"
                     x-transition:leave-end="opacity-0 -translate-y-2 sm:scale-95"
                     class="relative px-7 py-6 w-full max-w-11/12 rounded-2xl dark:bg-zinc-950 dark:text-white bg-white dark:border-zinc-800 border border-zinc-200 shadow-xl sm:max-w-lg">
                    <div class="flex justify-between items-center pb-3">
                        <h3 class="text-lg font-semibold">Before you begin</h3>
                    </div>
                    <div class="relative pb-8 w-auto">
                        <p class="text-sm dark:text-zinc-400">This guided process will help us craft a rich financial overview for you, as quickly as possible. Your data remains secure and organized at each stage.
                            To learn more, view our
                            <a href="{% url 'core:privacy_policy' %}" class="text-blue-500 dark:text-blue-400 underline">
                                privacy policy.
                            </a>
                        </p>
                    </div>
                    <div class="flex flex-col-reverse sm:flex-row sm:justify-end sm:space-x-2 gap-2">
                        <button @click="window.location.href='{% url 'core:dashboard' %}'" type="button" class="cursor-pointer inline-flex justify-center items-center px-4 py-2 h-10 text-sm font-medium rounded-2xl border border-zinc-200 dark:border-zinc-800 bg-white dark:bg-zinc-900 text-zinc-700 dark:text-zinc-300 hover:bg-zinc-50 dark:hover:bg-zinc-800 transition-all duration-150 shadow-xs">Cancel</button>
                        <button @click="modalOpen=false" type="button" class="cursor-pointer inline-flex justify-center items-center px-4 py-2 h-10 text-sm font-medium text-white dark:text-zinc-950 rounded-2xl transition-all duration-150 shadow-xs bg-zinc-900 hover:bg-zinc-800 dark:bg-zinc-100 dark:hover:bg-zinc-200 active:scale-[0.98]">Continue</button>
                    </div>
                </div>
            </div>
        </template>
    </div>
{% endblock onboarding_modal %}
