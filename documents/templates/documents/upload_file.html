{% extends 'base.html' %}

{% block content %}
{% csrf_token %}

<div x-data="{ modalOpen: true }"
    @keydown.escape.window="modalOpen = false"
    :class="{ 'z-40': modalOpen }" class="relative w-auto h-auto">
    <template x-teleport="body">
        <div x-show="modalOpen" class="fixed top-0 left-0 z-99 flex items-center justify-center w-screen h-screen" x-cloak>
            <div x-show="modalOpen"
                x-transition:enter="ease-out duration-300"
                x-transition:enter-start="opacity-0"
                x-transition:enter-end="opacity-100"
                x-transition:leave="ease-in duration-300"
                x-transition:leave-start="opacity-100"
                x-transition:leave-end="opacity-0"
                @click="modalOpen=false" class="absolute inset-0 w-full h-full backdrop-blur-sm bg-white/70 dark:bg-zinc-950/70"></div>
            <div x-show="modalOpen"
                x-trap.inert.noscroll="modalOpen"
                x-transition:enter="ease-out duration-300"
                x-transition:enter-start="opacity-0 -translate-y-2 sm:scale-95"
                x-transition:enter-end="opacity-100 translate-y-0 sm:scale-100"
                x-transition:leave="ease-in duration-200"
                x-transition:leave-start="opacity-100 translate-y-0 sm:scale-100"
                x-transition:leave-end="opacity-0 -translate-y-2 sm:scale-95"
                class="relative px-7 py-6 w-full max-w-11/12 rounded-4xl dark:bg-zinc-950 dark:text-white bg-white dark:border-zinc-800 border shadow-lg border-neutral-200 sm:max-w-lg sm:rounded-4xl">
                <div class="flex justify-between items-center pb-3">
                    <h3 class="text-lg font-semibold">Before you begin</h3>
                </div>
                <div class="relative pb-8 w-auto">
                    <p class="text-sm dark:text-zinc-400">This guided process will help us craft a complete financial overview for you, as quickly as possible. Your data remains secure and organized at each stage. 
                        To learn more, view our
                        <a href="{% url 'core:privacy_policy' %}" class="text-blue-500 dark:text-blue-400 underline">
                            privacy policy.
                        </a> 
                    </p>
                </div>
                <div class="flex flex-col-reverse sm:flex-row sm:justify-end sm:space-x-2 gap-2">
                    <button @click="window.location.href='{% url 'core:dashboard' %}'" type="button" class="cursor-pointer dark:border-zinc-500 inline-flex justify-center items-center px-4 py-2 h-10 text-sm font-medium rounded-4xl border transition-colors">Cancel</button>
                    <button @click="modalOpen=false" type="button" class="cursor-pointer dark:bg-white dark:text-black inline-flex justify-center items-center px-4 py-2 h-10 text-sm font-medium text-white rounded-4xl border border-transparent transition-colors bg-zinc-950 hover:bg-zinc-950/80 dark:hover:bg-white/70">Continue</button>
                </div>
            </div>
        </div>
    </template>
</div>

<main class="dark:text-white w-full min-h-screen flex flex-col items-center justify-center">
    <section class="container mx-auto w-11/12 md:w-3/5 max-w-11/12 lg:w-lg flex flex-col items-center">
        <p id="status" class="mb-4 text-sm text-center text-zinc-500 dark:text-zinc-400 min-h-5"></p>

        <h1 class="dark:text-white text-3xl md:text-4xl font-semibold mb-2 text-center">Upload a financial record.</h1>
        <p class="text-sm text-zinc-400 text-center">We’ll extract and organize the details automatically.</p>

        <div id="dropzone" class="max-h-70 transition-all duration-200 ease-out hover:bg-zinc-200 dark:hover:bg-zinc-900/80 cursor-pointer mt-8 mb-2 mx-auto flex flex-col items-center justify-center p-10 rounded-4xl border w-full border-zinc-200 dark:border-zinc-800 bg-zinc-100 dark:bg-zinc-800/40">
            <div class="flex flex-col items-center justify-center w-full h-64 bg-neutral-secondary-medium">
                <div class="flex flex-col items-center justify-center text-body pt-5 pb-6">
                    <svg class="size-12 mb-4 text-zinc-500 dark:text-zinc-300" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 5v9m-5 0H5a1 1 0 0 0-1 1v4a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1v-4a1 1 0 0 0-1-1h-2M8 9l4-5 4 5m1 8h.01"/>
                    </svg>
                    <p class="text-sm text-zinc-600 dark:text-zinc-300">
                        Drop your file here or click to browse
                    </p>
                    <p class="mt-2 text-xs text-zinc-400">
                        PNG, JPG, PDF, WEBP, HEIC · up to 5MB
                    </p>
                </div>
            </div>
        </div>

        <input type="file" id="fileInput" required class="hidden" accept=".jpg, .png, .jpeg, .webp, .pdf, .heic"/>

        <button id="uploadButton" onclick="uploadFile();" class="mt-2 bg-black dark:bg-white dark:text-black text-white py-2 px-4 rounded-4xl text-sm w-full cursor-pointer hover:bg-zinc-700 dark:hover:bg-zinc-300 transition-all ease-in-out duration-200">
            Upload and continue
        </button>

        <hr class="w-xs my-7 text-zinc-200 dark:text-zinc-800 mb-5">

        <a href="{% url 'records:add_record_manual' %}" class="text-sm text-zinc-500 dark:text-zinc-400 hover:text-zinc-500 dark:hover:text-zinc-300 transition-all ease-in-out duration-200 mt-0">
            Or enter record details manually.
        </a>
    </section>
</main>

<script>
const dropzone = document.getElementById('dropzone');
const fileInput = document.getElementById('fileInput');
const status = document.getElementById('status');
const uploadButton = document.getElementById('uploadButton');

/* Create file status element dynamically */
const fileStatus = document.createElement('div');
fileStatus.className = "mt-3 text-center text-sm text-zinc-500 dark:text-zinc-400";
dropzone.appendChild(fileStatus);

let selectedFile = null;

/* UI STATES */
function setStatus(msg, type = "idle") {
    status.textContent = msg;
    status.className =
        "mb-4 text-sm text-center min-h-5 transition-all duration-200 " +
        (
            type === "error"
                ? "text-red-500"
                : type === "success"
                ? "text-emerald-500"
                : "text-zinc-500 dark:text-zinc-400"
        );
}

function setFileSuccess(file) {
    fileStatus.innerHTML = "";

    const name = document.createElement("div");
    name.className = "text-emerald-500 font-medium text-sm";
    name.textContent = "✓ " + file.name;

    const meta = document.createElement("div");
    meta.className = "text-xs text-zinc-400 mt-1";
    meta.textContent = `${(file.size / 1024 / 1024).toFixed(2)} MB · ready`;

    fileStatus.appendChild(name);
    fileStatus.appendChild(meta);
}

function setDropzoneActive(active) {
    dropzone.classList.toggle('scale-[1.01]', active);
    dropzone.classList.toggle('!border-black', active);
    dropzone.classList.toggle('dark:!border-white', active);
}

/* VALIDATION */
function validate(file) {
    const MAX = 5 * 1024 * 1024;
    const allowed = ['jpg','png','jpeg','webp','pdf','heic'];
    const ext = file.name.split('.').pop().toLowerCase();

    if (file.size > MAX) {
        setStatus("File exceeds 5MB limit.", "error");
        return false;
    }

    if (!allowed.includes(ext)) {
        setStatus("Unsupported file type.", "error");
        return false;
    }

    return true;
}

function setFile(file) {
    if (!validate(file)) return;

    selectedFile = file;
    setFileSuccess(file);
    setStatus("");
}

/* EVENTS */
dropzone.addEventListener('click', () => fileInput.click());

fileInput.addEventListener('change', e => {
    if (e.target.files[0]) setFile(e.target.files[0]);
});

// Separated drag events to prevent early code cancellations
['dragenter','dragover'].forEach(evt => {
    dropzone.addEventListener(evt, e => {
        e.preventDefault();
        e.stopPropagation();
        setDropzoneActive(true);
    });
});

['dragleave'].forEach(evt => {
    dropzone.addEventListener(evt, e => {
        e.preventDefault();
        e.stopPropagation();
        setDropzoneActive(false);
    });
});

dropzone.addEventListener('drop', e => {
    e.preventDefault();
    e.stopPropagation();
    setDropzoneActive(false);

    const file = e.dataTransfer.files[0];
    if (file) setFile(file);
});

/* UPLOAD */
async function uploadFile() {
    if (!selectedFile) {
        setStatus("Select a file first.", "error");
        return;
    }

    uploadButton.disabled = true;
    uploadButton.textContent = "Uploading...";

    try {
        setStatus("Preparing upload...");

        const res = await fetch("/documents/upload/", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "X-CSRFToken": getCSRFToken(),
            },
            body: JSON.stringify({
                filename: selectedFile.name,
                content_type: selectedFile.type || "application/octet-stream",
            }),
        });

        if (!res.ok) throw new Error("Backend validation failed.");

        const { upload_url, document_id } = await res.json();

        setStatus("Uploading file...");

        const uploadRes = await fetch(upload_url, {
            method: "PUT",
            headers: {
                "Content-Type": selectedFile.type || "application/octet-stream",
            },
            body: selectedFile,
        });

        if (!uploadRes.ok) throw new Error("Cloud storage upload failed.");

        setStatus("Processing document...", "success");
        window.location.href = `/records/add_record/${document_id}`;

    } catch (err) {
        console.error(err);
        setStatus("Upload failed. (" + err.message + ")", "error");
    } finally {
        uploadButton.disabled = false;
        uploadButton.textContent = "Upload and continue";
    }
}

  function getCSRFToken() {
      const tokenInput = document.querySelector('[name=csrfmiddlewaretoken]');
      return tokenInput ? tokenInput.value : '';
  }
</script>
{% endblock %}
