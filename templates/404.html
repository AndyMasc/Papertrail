{% extends "base.html" %}

{% block title %}404 - Page Not Found | Papertrail{% endblock %}

{% block content %}
    <main class="flex min-h-[calc(100vh-12rem)] items-center justify-center px-6 py-24">
        <div class="max-w-md w-full text-center space-y-8">

            <div class="inline-flex items-center gap-2 px-3 py-1 rounded-xl bg-zinc-50 text-zinc-500 dark:bg-zinc-800/30 dark:text-zinc-400 border border-zinc-200/40 dark:border-zinc-800/40 text-[11px] font-medium tracking-wider uppercase">
                <span class="w-1.5 h-1.5 rounded-full bg-zinc-400 dark:bg-zinc-500" aria-hidden="true"></span>
                Error 404
            </div>

            <div class="space-y-3">
                <h1 class="text-4xl font-bold tracking-tight text-zinc-900 dark:text-zinc-50 sm:text-5xl">
                    Lost the trail.
                </h1>
                <p class="text-sm text-zinc-500 dark:text-zinc-400 max-w-xs mx-auto leading-relaxed">
                    The page you are looking for doesn't exist or has been moved to another record archive.
                </p>
            </div>

            <div class="py-12 border border-dashed border-zinc-200 dark:border-zinc-800/50 rounded-2xl bg-white/50 dark:bg-zinc-950/20 flex flex-col items-center justify-center">
                <svg class="w-8 h-8 text-zinc-300 dark:text-zinc-700 mb-3" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Z" />
                </svg>
                <span class="text-[11px] font-mono tracking-wide text-zinc-400 dark:text-zinc-600">
                    [record_not_found]
                </span>
            </div>

            <div class="flex flex-col sm:flex-row items-center justify-center gap-3">
                <a href="javascript:history.back()" class="w-full sm:w-auto inline-flex items-center justify-center gap-1.5 px-4 py-2 text-xs font-medium bg-white dark:bg-zinc-900 text-zinc-700 dark:text-zinc-300 border border-zinc-200 dark:border-zinc-800 hover:bg-zinc-50 dark:hover:bg-zinc-800 rounded-2xl transition-all duration-150 shadow-xs active:scale-[0.98]">
                    <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18" />
                    </svg>
                    Go Back
                </a>

                <a href="{% url 'core:dashboard' %}" class="w-full sm:w-auto inline-flex items-center justify-center gap-1.5 px-4 py-2 text-xs font-medium text-white bg-zinc-900 hover:bg-zinc-800 dark:bg-zinc-100 dark:text-zinc-950 dark:hover:bg-white rounded-2xl transition-all duration-150 shadow-xs active:scale-[0.98]">
                    Dashboard
                </a>
            </div>

        </div>
    </main>
{% endblock %}
