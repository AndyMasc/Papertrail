{% load i18n %}
<div class="container mx-auto mt-4 pt-1">
    <div class="w-11/12 md:w-4/5 lg:w-2/3 xl:w-1/2 max-w-md mx-auto flex flex-col p-10">

        <h1 class="mb-3 text-center text-3xl text-zinc-900 dark:text-zinc-50 tracking-tight font-semibold">{{ heading }}</h1>

        {% if subheading %}
            <p class="mb-3 text-center text-zinc-500 dark:text-zinc-400 text-sm">{{ subheading }}</p>
        {% endif %}

        {{ children }}
    </div>
</div>
