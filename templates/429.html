<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Too Many Requests</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-50 flex items-center justify-center min-h-screen dark:bg-zinc-900">
    <div class="text-center p-8 max-w-md bg-white rounded-xl shadow-md border border-zinc-100 dark:bg-zinc-800 dark:border-zinc-700">
        <h1 class="text-2xl font-bold text-zinc-900 dark:text-white mb-2">Slow down a bit</h1>
        <p class="text-zinc-600 dark:text-zinc-400 text-sm mb-6">You've made too many sign-in requests in a short period. Please wait before trying to get a new code.</p>
        <a href="/accounts/login/" class="inline-block px-4 py-2 bg-black text-white text-sm font-medium rounded-lg hover:bg-zinc-800 dark:bg-white dark:text-black dark:hover:bg-zinc-200">
            Return to Login
        </a>
    </div>
</body>
</html>
