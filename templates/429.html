<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Too Many Requests | Papertrail</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
        <script>
            tailwind.config = {
                theme: {
                    fontFamily: {
                        sans: ['Geist', 'system-ui', 'sans-serif'],
                    }
                }
            }
        </script>
    </head>
    <body class="font-sans bg-zinc-50 dark:bg-zinc-950 flex items-center justify-center min-h-screen">
        <div class="text-center p-8 max-w-md bg-white dark:bg-zinc-900 rounded-2xl border border-zinc-200/50 dark:border-zinc-800/50 shadow-lg">
            <h1 class="text-2xl font-bold text-zinc-900 dark:text-zinc-50 mb-2">Slow down a bit</h1>
            <p class="text-zinc-500 dark:text-zinc-400 text-sm mb-6">You've made too many sign-in requests in a short period. Please wait before trying to get a new code.</p>
            <a href="/accounts/login/" class="inline-flex items-center justify-center px-4 py-2 bg-zinc-900 hover:bg-zinc-800 text-white text-sm font-medium rounded-2xl transition-all duration-150 dark:bg-zinc-100 dark:text-zinc-950 dark:hover:bg-zinc-200 shadow-xs active:scale-[0.98]">
                Return to Login
            </a>
        </div>
    </body>
</html>
