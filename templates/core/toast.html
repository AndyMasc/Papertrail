<div id="django-messages-toast">
    <div
        class="fixed top-6 left-1/2 -translate-x-1/2 sm:left-auto sm:translate-x-0 sm:right-6 z-50 w-[calc(100%-2rem)] max-w-sm overflow-hidden rounded-2xl border border-zinc-200/50 bg-white/90 p-4 shadow-lg shadow-zinc-200/30 backdrop-blur-md dark:border-zinc-800/50 dark:bg-zinc-950/90 dark:shadow-none"
        x-data="{
                messageVisible: false,
                messageText: '',
                messageTags: '',
                triggerToast(text, tags) {
                this.messageText = text;
                this.messageTags = tags;
                this.messageVisible = true;
                setTimeout(() => { this.messageVisible = false }, 5000);
                }
                }"
        x-init="
                {% if messages %}
                    {% for message in messages %}
                        setTimeout(() => { triggerToast('{{ message|escapejs }}', '{{ message.tags }}') }, 100);
                    {% endfor %}
                {% endif %}
               "
        @django-messages.window="triggerToast($event.detail.message, $event.detail.tags)"
        x-show="messageVisible"
        x-cloak
        x-transition:enter="transition ease-out duration-300"
        x-transition:enter-start="-translate-y-8 opacity-0 scale-95"
        x-transition:enter-end="translate-y-0 opacity-100 scale-100"
        x-transition:leave="transition ease-in duration-200"
        x-transition:leave-start="translate-y-0 opacity-100"
        x-transition:leave-end="-translate-y-8 opacity-0">

        <div class="flex items-start gap-3">
            <div class="flex-shrink-0">
                <template x-if="messageTags.includes('success')">
                    <span class="inline-flex rounded-xl bg-emerald-500/10 p-2 text-emerald-600 dark:text-emerald-400">
                        <svg class="size-4" fill="none" viewBox="0 0 24 24" stroke-width="2.2" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
                        </svg>
                    </span>
                </template>
                <template x-if="messageTags.includes('error') || messageTags.includes('danger')">
                    <span class="inline-flex rounded-xl bg-rose-500/10 p-2 text-rose-600 dark:text-rose-400">
                        <svg class="size-4" fill="none" viewBox="0 0 24 24" stroke-width="2.2" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9 3.75h.008v.008H12v-.008Z" />
                        </svg>
                    </span>
                </template>
            </div>

            <div class="flex-1 space-y-0.5">
                <h5 class="text-sm font-semibold tracking-tight text-zinc-900 dark:text-zinc-50 capitalize" x-text="messageTags || 'Notification'"></h5>
                <p class="text-xs leading-relaxed text-zinc-500 dark:text-zinc-400" x-text="messageText"></p>
            </div>
        </div>
    </div>
</div>
