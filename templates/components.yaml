components:
  button:
    path: "slippers/components/button.html"
    contexts:
      - type: "primary"
        props:
          variant: "primary"
          children: "Primary Button"
      - type: "secondary"
        props:
          variant: "secondary"
          children: "Secondary Button"
      - type: "danger"
        props:
          variant: "danger"
          children: "Danger Button"
  input:
    path: "slippers/components/input.html"
    contexts:
      - type: "text"
        props:
          type: "text"
          placeholder: "Enter text..."
      - type: "email"
        props:
          type: "email"
          placeholder: "Enter email..."
  card:
    path: "slippers/components/card.html"
    contexts:
      - type: "default"
        props:
          title: "Card Title"
          children: "Card content goes here"