name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.14"
  DJANGO_SETTINGS_MODULE: "Papertrail.settings.local"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install ruff
        run: pip install ruff
      - name: Ruff check
        run: ruff check .
      - name: Ruff format check
        run: ruff format --check .

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      - name: Run mypy
        run: mypy .

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          pip install bandit[toml]
      - name: Run bandit
        run: bandit -c pyproject.toml -r .

  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: papertrail_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      SECRET_KEY: ci-test-secret-key-not-for-production
      DEBUG: "false"
      ALLOWED_HOSTS: localhost,127.0.0.1
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/papertrail_test
      REDIS_URL: redis://localhost:6379/0
      R2_ACCESS_KEY_ID: test
      R2_SECRET_ACCESS_KEY: test
      R2_STORAGE_BUCKET_NAME: test
      R2_S3_ENDPOINT_URL: https://test.localhost
      R2_PAPERTRAIL_STORAGE_ACCOUNT_ID: test
      GEMINI_API_KEY: test
      QSTASH_TOKEN: test
      DJANGO_QSTASH_DOMAIN: https://test.localhost
      DJANGO_QSTASH_WEBHOOK_PATH: /qstash/
      QSTASH_CURRENT_SIGNING_KEY: test
      QSTASH_NEXT_SIGNING_KEY: test
      WEB_PUSH_PUBLIC_KEY: test
      WEB_PUSH_PRIVATE_KEY: test
      WEB_PUSH_EMAIL: test@example.com
      PLAID_CLIENT_ID: test
      PLAID_SECRET: test
      PLAID_ENV: sandbox
      PLAID_WEBHOOK_URL: https://test.localhost/plaid/webhook/
      RESEND_API_KEY: test
      GOOGLE_OAUTH_CLIENT_ID: test
      GOOGLE_OAUTH_CLIENT_SECRET: test
      GITHUB_OAUTH_CLIENT_ID: test
      GITHUB_OAUTH_CLIENT_SECRET: test
      SITE_URL: http://localhost:8000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      - name: Run migrations
        run: python manage.py migrate --no-input
        env:
          DJANGO_SETTINGS_MODULE: Papertrail.settings.local
      - name: Run tests
        run: |
          pytest --tb=short -q --numprocesses=auto
        env:
          DJANGO_SETTINGS_MODULE: Papertrail.settings.local
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/
          retention-days: 7
